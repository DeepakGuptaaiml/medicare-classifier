name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements-api.txt
          pip install pytest httpx

      - name: Run tests
        env:
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
        run: pytest tests/ -v

  docker-api:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image name (GHCR requires lowercase)
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (API)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push API Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' }}
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Smoke test API container
        env:
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
        run: |
          docker run -d --name api-test -p 8000:8000 \
            -e HF_API_TOKEN="${HF_API_TOKEN:-}" \
            ${{ steps.build.outputs.imageid }}
          sleep 15
          curl -f http://localhost:8000/health
          curl -f http://localhost:8000/rag/status
          if [ -n "$HF_API_TOKEN" ]; then
            curl -sf -X POST http://localhost:8000/ask \
              -H "Content-Type: application/json" \
              -d '{"question": "What is MMSEA Section 111?"}'
          else
            code=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:8000/ask \
              -H "Content-Type: application/json" \
              -d '{"question": "What is MMSEA Section 111?"}')
            test "$code" = "503"
          fi
          docker stop api-test

  docker-streamlit:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase Streamlit image name
        run: echo "STREAMLIT_IMAGE=$(echo '${{ github.repository }}-streamlit' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (Streamlit)
        id: meta_streamlit
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.STREAMLIT_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push Streamlit Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.streamlit
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta_streamlit.outputs.tags }}
          labels: ${{ steps.meta_streamlit.outputs.labels }}
